media:
  - name: works-images
    label: Painting images
    input: src/content/works/images
    output: ./images
    extensions: [jpg, jpeg, png, webp]
    categories: [image]

content:
  - name: works
    label: Works
    type: collection
    path: src/content/works
    filename: "{fields.title}.md"
    format: yaml-frontmatter
    view:
      primary: title
      fields: [title, year, medium, order]
      sort: [order, year, title]
      default:
        sort: order
        order: asc
    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: year
        label: Year
        type: number
        required: true
        options:
          min: 1900
          max: 2100
          step: 1

      - name: medium
        label: Medium
        type: string
        description: "Leave blank for 'Oil on canvas'."

      - name: image
        label: Painting image
        type: image
        required: true
        options:
          media: works-images

      - name: alt
        label: Image alt text
        type: string
        required: true
        description: "One sentence describing the painting for screen readers."

      - name: order
        label: Display order
        type: number
        options:
          min: 1
        description: "Lower numbers appear first. Use 10, 20, 30 to leave room to insert new paintings without renumbering."

      - name: dimensions
        label: Dimensions
        type: string
        description: 'e.g. 30 × 40 in'

      - name: location
        label: Location / subject
        type: string

      - name: body
        label: Description
        type: rich-text

settings:
  content:
    merge: false
